<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>產品 — 沛素 per-sulii</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Funnel+Display:wght@300..800&family=Noto+Sans+TC:wght@300;400;500;700&family=Noto+Serif+TC:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
</head>

<body data-page="products">

  <div id="site-header"></div>

  <main>

    <section class="pagehead">
      <div class="wrap">
        <div class="eyebrow">Products</div>
        <h1 class="h2 mt16">在家養出好肌膚</h1>
      </div>
    </section>

    <section class="sec">
      <div class="wrap">
        <div class="grid g2" id="product-list"></div>
      </div>
    </section>

    <!-- 品牌保證 -->
    <section class="sec tight" style="background:var(--bg)">
      <div class="wrap center">
        <span
          style="display:inline-block;background:#1f1f1f;color:#fff;font-size:clamp(14px,1.4vw,17px);font-weight:500;padding:3px;border-radius:2px;letter-spacing:.04em">
          符合 TFDA PIF · 國際 INCI 認證 · GMP 品質管理
        </span>
        <p class="body mt16">所有產品依國際 INCI 命名系統標示成分，從原料到成品嚴格把關。</p>
      </div>
    </section>
  </main>

  <div id="site-footer"></div>

  <script src="js/components.js"></script>
  <script src="js/main.js"></script>
</body>

</html>
