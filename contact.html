<body data-page="contact">

  <div id="site-header"></div>

  <main>

    <section class="sec" style="padding-top:clamp(38px,4.8vw,72px);padding-bottom:clamp(38px,4.8vw,72px)">
      <form class="wrap" style="max-width:620px" id="contact-form">
        <input type="hidden" name="access_key" value="c44f2510-388b-477e-a3ec-f2446b1304c2">
        <input type="hidden" name="subject" value="沛素官網經銷洽詢">
        <input type="checkbox" name="botcheck" class="sr-only" tabindex="-1" autocomplete="off">
        <h1 class="h2 center" style="margin-bottom:40px">與我們聯繫</h1>
        <div class="field">
          <label for="f-company">公司 / 品牌名稱</label>
          <input id="f-company" name="company" type="text" placeholder="請輸入">
        </div>
        <div class="field">
          <label for="f-contact">聯絡人</label>
          <input id="f-contact" name="contact" type="text" placeholder="請輸入">
        </div>
        <div class="grid g2" style="gap:18px">
          <div class="field">
            <label for="f-phone">電話</label>
            <input id="f-phone" name="phone" type="tel" placeholder="請輸入">
          </div>
          <div class="field">
            <label for="f-email">Email</label>
            <input id="f-email" name="email" type="email" placeholder="請輸入">
          </div>
        </div>
        <div class="field">
          <label for="f-msg">需求說明</label>
          <textarea id="f-msg" name="message" rows="5" placeholder="請簡述合作需求"></textarea>
        </div>
        <div class="center mt32">
          <button type="submit" class="btn solid" id="contact-submit-btn">送出洽詢</button>
          <p class="small mt16" id="contact-form-status" style="display:none"></p>
        </div>
      </form>
    </section>

    <!-- 聯絡資訊 -->
    <section class="sec tight" style="background:var(--bg)">
      <div class="wrap center">
        <div class="eyebrow">Contact Info</div>
        <h2 class="h3 mt16" id="contact-company">諾田康美有限公司</h2>
        <p class="body mt8" id="contact-phone">0912-125-856</p>
        <p class="body mt8" id="contact-address">台南市麻豆區客子路116號</p>
      </div>
    </section>

  <div id="site-footer"></div>
